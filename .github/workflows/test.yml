name: Tests
on: [push, pull_request]
jobs:
  rspec:
    strategy:
      matrix:
        ruby: ['3.0', '3.2', '3.4']
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: ruby/setup-ruby@v1
        with:
          ruby-version: ${{ matrix.ruby }}
          bundler-cache: true
      - run: bundle exec rspec
